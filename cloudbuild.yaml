# ============================================================
# Cloud Build CI/CD pipeline
# ------------------------------------------------------------
# Builds an immutable image tagged with the git commit SHA,
# pushes to Artifact Registry, and deploys a new Cloud Run revision.
# Every revision is retained for instant rollback (see DEPLOY.md).
# ============================================================

substitutions:
  _REGION: us-central1
  _REPO: webapp
  _SERVICE: analytics-webapp
  _BQ_DATASET: 'RHQ_INSIGHTS'
  _BQ_TABLE: 'User_Journey_Analysis_Adobe'
  # Cap rows per request — Cloud Run HTTP responses are limited to ~32 MiB.
  _BQ_ROW_LIMIT: '10000'
  _MEMORY: '2Gi'
  _RUNTIME_SA: 'user-journey-analysis-adobe@${PROJECT_ID}.iam.gserviceaccount.com'
  # internal = VPN/VPC only (recommended). Use "all" for a public URL.
  _INGRESS: all

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '.'

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=${_RUNTIME_SA}'
      - '--ingress=${_INGRESS}'
      - '--allow-unauthenticated'
      - '--memory=${_MEMORY}'
      - '--set-env-vars=BQ_PROJECT=${PROJECT_ID},BQ_DATASET=${_BQ_DATASET},BQ_TABLE=${_BQ_TABLE},BQ_LOCATION=US,BQ_ROW_LIMIT=${_BQ_ROW_LIMIT}'
      - '--revision-suffix=${SHORT_SHA}'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
